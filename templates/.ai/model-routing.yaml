version: 1
enabled: true

lead:
  role: orchestrator
  provider: claude
  model: claude
  responsibilities:
    - score tasks
    - split work into bounded subtasks
    - approve architecture and security decisions
    - request Claude reviewer checks for delegated outputs
    - deliver the final response

reviewer:
  provider: claude
  model: claude
  role: reviewer
  responsibilities:
    - review every delegated implementation before final delivery
    - return failed work to the implementing model with concrete findings
    - approve only when acceptance criteria and validation evidence are met

# Replace provider/model values with models available in your tools.
tiers:
  fast:
    provider: gemini
    model: gemini-2.5-flash
    score_range: [0, 2]
    token_budget: 4000
    use_for:
      - repository search
      - documentation cleanup
      - formatting
      - simple test generation

  standard:
    provider: codex
    model: gpt-5.5
    score_range: [3, 5]
    token_budget: 8000
    use_for:
      - localized bug fixes
      - small UI changes
      - API wiring
      - focused test implementation

  strong:
    provider: claude
    model: claude
    score_range: [6, 8]
    token_budget: 16000
    use_for:
      - multi-file implementation
      - complex debugging
      - contract changes
      - code review

  lead:
    provider: claude
    model: claude
    score_range: [9, 10]
    token_budget: 24000
    use_for:
      - task decomposition
      - architecture
      - security-sensitive work
      - final review and synthesis

scoring:
  complexity:
    range: [0, 3]
    guidance:
      0: mechanical or single obvious edit
      1: localized change using existing patterns
      2: multi-file logic or non-trivial debugging
      3: architecture, concurrency, or cross-system behavior

  risk:
    range: [0, 3]
    guidance:
      0: docs, formatting, or isolated tests
      1: reversible product behavior
      2: public API, persistent data, or broad regression risk
      3: auth, security, payments, destructive actions, or production infra

  ambiguity:
    range: [0, 2]
    guidance:
      0: explicit requirement and acceptance criteria
      1: assumptions needed but bounded
      2: unclear behavior or conflicting requirements

  context:
    range: [0, 2]
    guidance:
      0: one or two known files
      1: several files in one subsystem
      2: broad repository or multiple systems

rules:
  minimum_tier:
    architecture: lead
    auth_or_security: lead
    payments: lead
    destructive_migration: lead
    public_api_change: strong
    final_review: lead
  delegate_only_bounded_tasks: true
  require_acceptance_criteria: true
  require_validation_command: true
  send_only_required_context: true
  parallelize_only_independent_tasks: true
  claude_reviewer_must_review_outputs: true
  return_failed_review_to_implementing_model: true

fallback:
  unavailable_model: current_model_executes_locally
  delegation_not_supported: current_model_executes_locally
  failed_validation: retry_implementing_model_once_then_current_model
  failed_claude_review: retry_implementing_model_once_then_current_model

# CLI connection details are intentionally separate from routing policy.
# Configure executable commands in .ai/cli-adapters.json and use
# .ai/router/run-model.js to invoke a selected tier when your environment
# supports delegation through local CLIs.
